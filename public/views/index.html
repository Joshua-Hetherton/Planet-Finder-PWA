<!DOCTYPE html>
<html>
    <head>
        <title>Planet Finder PWA</title>
        <link rel="stylesheet" href="../css/main.css">
    </head>
    <body>
                
        <!-- Header -->
        <header>
            <h1> Welcome to the Planet Finder Website!</h1>

        </header>

        <!-- Navigation Layout -->
        <div class="navigation-bar">
            
        </div>
        <div class="button-images">
            <!-- Displays Images which can be clicked, allowing for a nicer User Interface-->
            <!--Each image is put into a wrapper class to stop it expanding when hovered over-->
            <div class="wrap-image">
                <input type="image" src="../images/planets/Mariner_10_Mercury.jpg" name="Mercury" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Mariner_10_Venus.jpg" name="Venus" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Earth_Moon.jpg" name="Moon" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Mars-valles-marineris-enhanced.jpg" name="Mars" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Voyager 1-Jupiter.jpg" name="Jupiter" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Cassini-Saturn.jpg" name="Saturn" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Voyager-2-Uranus.jpg" name="Uranus" class="btTxt submit" id="Planet-Button" />
            </div>

            <div class="wrap-image">
                <input type="image" src="../images/planets/Neptune.jpg" name="Neptune" class="btTxt submit" id="Planet-Button" />
            </div>

            
            
            
           
            
            
            
            
        </div>
        <script>
            window.addEventListener("DOMContentLoaded", () => {
                const img = document.getElementById("Planet-Button");

                img.addEventListener("click", () => {
                    img.src = "../images/planets/Earth_Moon.jpg";
                });
            });
        </script>



    </body>
</html>
