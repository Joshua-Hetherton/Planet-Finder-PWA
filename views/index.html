<!DOCTYPE html>
<html>
    <head>
        <title>Planet Finder PWA</title>
        <link rel="stylesheet" href="/css/main.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
                
        <!-- Header -->
        <header>
            <h1> Welcome to the Planet Finder Website!</h1>

        </header>

        <!-- Navigation Layout -->
        <div class="navigation-bar">
            <a href="/">Home</a>
            <select class="nav-planet-dropdwon" id="nav-planet-dropdown">
                <option value="" disabled selected>Planets</option>
                <option value="/planet/mercury">Mercury</option>
                <option value="/planet/venus">Venus</option>
                <option value="/planet/moon">Moon</option>
                <option value="/planet/mars">Mars</option>
                <option value="/planet/jupiter">Jupiter</option>
                <option value="/planet/saturn">Saturn</option>
                <option value="/planet/uranus">Uranus</option>
                <option value="/planet/neptune">Neptune</option>

            </select>
            <a href="/calendar">Viewing Calendar</a>
        </div>
        <div class="button-images">
            <!-- Displays Images which can be clicked, allowing for a nicer User Interface-->
            <!--Each image is put into a wrapper class to stop it expanding when hovered over-->
            <div class="wrap-image">
                <a href="/planet/mercury">
                    <input type="image" src="/images/planets/Mariner_10_Mercury.jpg" 
                    name="Mercury" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/venus">
                    <input type="image" src="/images/planets/Mariner_10_Venus.jpg" 
                    name="Venus" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/moon">
                    <input type="image" src="/images/planets/Earth_Moon.jpg" 
                    name="Moon" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/mars">
                    <input type="image" src="/images/planets/Mars-valles-marineris-enhanced.jpg" 
                    name="Mars" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/jupiter">
                    <input type="image" src="/images/planets/Voyager 1-Jupiter.jpg" 
                    name="Jupiter" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/saturn">
                    <input type="image" src="/images/planets/Cassini-Saturn.jpg" 
                    name="Saturn" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/uranus">
                    <input type="image" src="/images/planets/Voyager-2-Uranus.jpg" 
                    name="Uranus" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>

            <div class="wrap-image">
                <a href="/planet/neptune">
                    <input type="image" src="/images/planets/Neptune.jpg" 
                    name="Neptune" 
                    loading="lazy" 
                    class="btTxt submit" id="Planet-Button" />
                </a>
            </div>
            
            
        </div>
    <script>
        document.getElementById("nav-planet-dropdown").addEventListener("change", function () {
            if (this.value) {
                window.location.href = this.value;
            }
        })
    </script>
    </body>
</html>
